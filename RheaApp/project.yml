name: RheaApp
options:
  bundleIdPrefix: com.rhea
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"

packages:
  RheaKit:
    path: ../../packages/RheaKit
  AnimatedTabBar:
    url: https://github.com/serg-alexv/AnimatedTabBar
    from: "0.0.1"

targets:
  RheaApp:
    type: application
    platform: iOS
    sources:
      - path: ../RheaPreview.swiftpm/Sources
        includes:
          - RheaPreviewApp.swift
          - ScreenPilotView.swift
          - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rhea.preview
        DEVELOPMENT_TEAM: "398XACWZ7G"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "15"
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: RheaApp.entitlements
      configs:
        debug: {}
        release: {}
    dependencies:
      - package: RheaKit
      - package: AnimatedTabBar
      - target: RheaTunnel
      - target: RheaKeyboard
    info:
      path: Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        CFBundleIconName: AppIcon
        CFBundleDisplayName: Rhea
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - rhea
            CFBundleURLName: com.rhea.oauth

  RheaTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: ../RheaTunnel/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rhea.preview.tunnel
        DEVELOPMENT_TEAM: "398XACWZ7G"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "15"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        CODE_SIGN_ENTITLEMENTS: RheaTunnel.entitlements
    info:
      path: RheaTunnel-Info.plist
      properties:
        CFBundleDisplayName: Rhea Tunnel
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider

  RheaCommandCentre:
    type: application
    platform: macOS
    sources:
      - path: ../RheaPreview.swiftpm/Sources
        includes:
          - CommandCentreApp.swift
          - CommandCentreLayout.swift
          - MenuBarView.swift
          - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rhea.commandcentre
        DEVELOPMENT_TEAM: "398XACWZ7G"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "15"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        debug: {}
        release: {}
    dependencies:
      - package: RheaKit
    info:
      path: CommandCentre-Info.plist
      properties:
        CFBundleDisplayName: Rhea Command Centre
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)

  RheaKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: ../RheaKeyboard/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rhea.preview.keyboard
        DEVELOPMENT_TEAM: "398XACWZ7G"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "15"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        CODE_SIGN_ENTITLEMENTS: RheaKeyboard.entitlements
    info:
      path: RheaKeyboard-Info.plist
      properties:
        CFBundleDisplayName: Rhea
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            RequestsOpenAccess: true
            PrimaryLanguage: en
            PrefersRightToLeft: false
            IsASCIICapable: true
